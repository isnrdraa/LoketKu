<!DOCTYPE html>
<html lang="id">
<head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>LoketKu</title>
    <style>
        * { box-sizing: border-box; margin: 0; padding: 0; }
        body {
            font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', sans-serif;
            background: #f8fafc;
            display: flex;
            flex-direction: column;
            align-items: center;
            justify-content: center;
            min-height: 100vh;
            color: #1e293b;
        }
        .logo {
            width: 72px;
            height: 72px;
            background: #6366f1;
            border-radius: 18px;
            display: flex;
            align-items: center;
            justify-content: center;
            margin-bottom: 20px;
        }
        .logo svg { width: 40px; height: 40px; fill: white; }
        h1 { font-size: 24px; font-weight: 700; margin-bottom: 8px; }
        p  { font-size: 14px; color: #64748b; text-align: center; max-width: 280px; line-height: 1.6; }
        .spinner {
            margin-top: 32px;
            width: 36px; height: 36px;
            border: 3px solid #e2e8f0;
            border-top-color: #6366f1;
            border-radius: 50%;
            animation: spin 0.8s linear infinite;
        }
        @keyframes spin { to { transform: rotate(360deg); } }
        .retry {
            margin-top: 24px;
            padding: 10px 24px;
            background: #6366f1;
            color: white;
            border: none;
            border-radius: 8px;
            font-size: 14px;
            cursor: pointer;
            display: none;
        }
        .retry:hover { background: #4f46e5; }
    </style>
</head>
<body>
    <div class="logo">
        <svg viewBox="0 0 24 24" xmlns="http://www.w3.org/2000/svg">
            <path d="M4 4h16v2H4V4zm0 4h10v2H4V8zm0 4h16v2H4v-2zm0 4h10v2H4v-2z"/>
        </svg>
    </div>

    <h1>LoketKu</h1>
    <p id="msg">Menghubungkan ke server…</p>

    <div class="spinner" id="spinner"></div>
    <button class="retry" id="retryBtn" onclick="retry()">Coba Lagi</button>

    <script>
        // Coba koneksi ke server setiap 3 detik
        let attempts = 0;

        function checkServer() {
            attempts++;
            // Server URL diambil dari capacitor config (sudah di-inject oleh WebView)
            // Halaman ini hanya tampil jika server.url tidak bisa diakses
            if (attempts >= 5) {
                document.getElementById('msg').textContent =
                    'Tidak dapat terhubung ke server. Pastikan server sedang berjalan dan perangkat terhubung ke jaringan yang sama.';
                document.getElementById('spinner').style.display = 'none';
                document.getElementById('retryBtn').style.display = 'inline-block';
            }
        }

        function retry() {
            document.getElementById('msg').textContent = 'Menghubungkan ke server…';
            document.getElementById('spinner').style.display = 'block';
            document.getElementById('retryBtn').style.display = 'none';
            attempts = 0;
            setTimeout(() => location.reload(), 500);
        }

        setInterval(checkServer, 3000);
    </script>
</body>
</html>
